{% extends "base.html" %}

{% block title %}Edit Customer - Insurance System{% endblock %}

{% block content %}
<!-- Main Content -->
<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card">
                <div class="card-header bg-warning text-dark">
                    <h5 class="mb-0">
                        <i class="fas fa-edit me-2"></i>Edit Customer
                    </h5>
                </div>
                <div class="card-body">
                    <form method="POST" action="{{ url_for('customer.edit', id=customer.cus_id) }}">
                        <!-- Customer Name -->
                        <div class="mb-3">
                            <label for="cus_name" class="form-label">
                                Customer Name <span class="text-danger">*</span>
                            </label>
                            <input type="text" 
                                   class="form-control" 
                                   id="cus_name" 
                                   name="cus_name"
                                   value="{{ customer.cus_name }}"
                                   required>
                        </div>
                        
                        <!-- Mobile Number -->
                        <div class="mb-3">
                            <label for="cus_mobile" class="form-label">
                                Mobile Number <span class="text-danger">*</span>
                            </label>
                            <input type="tel" 
                                   class="form-control" 
                                   id="cus_mobile" 
                                   name="cus_mobile"
                                   value="{{ customer.cus_mobile }}"
                                   pattern="[0-9]{10}"
                                   maxlength="10"
                                   required>
                        </div>
                        
                        <!-- Email -->
                        <div class="mb-3">
                            <label for="cus_email" class="form-label">
                                Email Address
                            </label>
                            <input type="email" 
                                   class="form-control" 
                                   id="cus_email" 
                                   name="cus_email"
                                   value="{{ customer.cus_email or '' }}">
                        </div>
                        
                        <!-- Address -->
                        <div class="mb-3">
                            <label for="cus_add" class="form-label">
                                Address
                            </label>
                            <textarea class="form-control" 
                                      id="cus_add" 
                                      name="cus_add" 
                                      rows="3">{{ customer.cus_add or '' }}</textarea>
                        </div>
                        
                        <!-- Active Status -->
                        <div class="mb-3 form-check">
                            <input type="checkbox" 
                                   class="form-check-input" 
                                   id="is_active" 
                                   name="is_active"
                                   {% if customer.is_active %}checked{% endif %}>
                            <label class="form-check-label" for="is_active">
                                Active
                            </label>
                        </div>
                        
                        <!-- Buttons -->
                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-warning">
                                <i class="fas fa-save me-2"></i>Update Customer
                            </button>
                            <a href="{{ url_for('customer.index') }}" class="btn btn-secondary">
                                <i class="fas fa-times me-2"></i>Cancel
                            </a>
                        </div>
                    </form>
                </div>
                <div class="card-footer text-muted">
                    <small>
                        <i class="fas fa-info-circle me-1"></i>
                        Created: {{ customer.created_at.strftime('%Y-%m-%d %H:%M') if customer.created_at else 'N/A' }}
                    </small>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
